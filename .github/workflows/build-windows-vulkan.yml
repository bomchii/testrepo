name: Build s2.cpp - Windows + Vulkan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Windows Server 2025 - MSVC - Vulkan
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Verificar y exportar rutas del Vulkan SDK
        shell: pwsh
        run: |
          # El action escribe VULKAN_SDK al entorno, pero CMake a veces
          # no lo recoge. Lo exportamos explicitamente con las rutas exactas.
          $sdk = $env:VULKAN_SDK
          if (-Not $sdk) {
            # Fallback: buscar en la ruta tipica de instalacion de LunarG
            $sdk = Get-ChildItem "C:\VulkanSDK" -Directory |
                   Sort-Object Name -Descending |
                   Select-Object -First 1 -ExpandProperty FullName
          }
          if (-Not $sdk) { Write-Error "VULKAN_SDK no encontrado"; exit 1 }

          Write-Host "VULKAN_SDK = $sdk"

          $inc  = "$sdk\Include"
          $lib  = "$sdk\Lib\vulkan-1.lib"

          if (-Not (Test-Path $inc))  { Write-Error "Include dir no existe: $inc";  exit 1 }
          if (-Not (Test-Path $lib))  { Write-Error "vulkan-1.lib no existe: $lib"; exit 1 }

          # Persistir para los steps siguientes
          "VULKAN_SDK=$sdk"             >> $env:GITHUB_ENV
          "Vulkan_INCLUDE_DIR=$inc"     >> $env:GITHUB_ENV
          "Vulkan_LIBRARY=$lib"         >> $env:GITHUB_ENV
          "$sdk\Bin"                    >> $env:GITHUB_PATH

          Write-Host "Include : $inc"
          Write-Host "Library : $lib"

      # Los shaders se generan desde cero durante el build.
      # No usamos los precompilados del ZIP porque fueron generados sin
      # soporte coopmat, y el Vulkan SDK actual los detecta como disponibles,
      # causando una discrepancia entre el .hpp y el .cpp.

      - name: Parchear CMakeLists.txt para Windows
        shell: pwsh
        run: pwsh -File patch-cmake.ps1

      - name: Cache dependencias FetchContent
        uses: actions/cache@v5
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-

      - name: CMake Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DS2_VULKAN=ON `
            -DGGML_VULKAN=ON `
            -DS2_CUDA=OFF `
            -DS2_METAL=OFF `
            -DVulkan_INCLUDE_DIR="$env:Vulkan_INCLUDE_DIR" `
            -DVulkan_LIBRARY="$env:Vulkan_LIBRARY" `
            -DGGML_VULKAN_COOPMAT_GLSLC_SUPPORT=OFF `
            -DGGML_VULKAN_COOPMAT2_GLSLC_SUPPORT=OFF `
            -DGGML_VULKAN_INTEGER_DOT_GLSLC_SUPPORT=OFF

      - name: CMake Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Verificar ejecutable
        shell: pwsh
        run: |
          $exe = "build\Release\s2.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "s2.exe no fue generado."
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "OK: s2.exe ($sizeMB MB)"
          & $exe --help

      - name: Empaquetar release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null
          Copy-Item build\Release\s2.exe release\
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue | Copy-Item -Destination release\
          if (Test-Path tokenizer.json) { Copy-Item tokenizer.json release\ }
          Get-ChildItem release\ | Format-Table Name, Length -AutoSize

      - name: Subir artifact
        uses: actions/upload-artifact@v6
        with:
          name: s2-windows-vulkan
          path: release/
          retention-days: 30

      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: release/s2.exe
          generate_release_notes: true
