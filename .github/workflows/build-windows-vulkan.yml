name: Build s2.cpp - Windows (Vulkan + CUDA)

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    name: Windows Server 2025 - MSVC - Vulkan
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.2
        with:
          version: 1.4.309.0
          cache: true

      - name: Verificar y exportar rutas del Vulkan SDK
        shell: pwsh
        run: |
          # El action escribe VULKAN_SDK al entorno, pero CMake a veces
          # no lo recoge. Lo exportamos explicitamente con las rutas exactas.
          $sdk = $env:VULKAN_SDK
          if (-Not $sdk) {
            # Fallback: buscar en la ruta tipica de instalacion de LunarG
            $sdk = Get-ChildItem "C:\VulkanSDK" -Directory |
                   Sort-Object Name -Descending |
                   Select-Object -First 1 -ExpandProperty FullName
          }
          if (-Not $sdk) { Write-Error "VULKAN_SDK no encontrado"; exit 1 }

          Write-Host "VULKAN_SDK = $sdk"

          $inc  = "$sdk\Include"
          $lib  = "$sdk\Lib\vulkan-1.lib"

          if (-Not (Test-Path $inc))  { Write-Error "Include dir no existe: $inc";  exit 1 }
          if (-Not (Test-Path $lib))  { Write-Error "vulkan-1.lib no existe: $lib"; exit 1 }

          # Persistir para los steps siguientes
          "VULKAN_SDK=$sdk"             >> $env:GITHUB_ENV
          "Vulkan_INCLUDE_DIR=$inc"     >> $env:GITHUB_ENV
          "Vulkan_LIBRARY=$lib"         >> $env:GITHUB_ENV
          "$sdk\Bin"                    >> $env:GITHUB_PATH

          Write-Host "Include : $inc"
          Write-Host "Library : $lib"

      # Los shaders se generan desde cero durante el build.
      # No usamos los precompilados del ZIP porque fueron generados sin
      # soporte coopmat, y el Vulkan SDK actual los detecta como disponibles,
      # causando una discrepancia entre el .hpp y el .cpp.

      - name: Parchear CMakeLists.txt para Windows
        shell: pwsh
        run: pwsh -File patch-cmake.ps1

      - name: Cache Crow headers
        uses: actions/cache@v5
        with:
          path: build/_deps/crow-include
          key: crow-${{ runner.os }}-v1.3.1

      - name: Generar tokenizer_data embebido en el exe
        shell: pwsh
        run: |
          $json = "tokenizer.json"
          if (-Not (Test-Path $json)) { Write-Error "tokenizer.json no encontrado"; exit 1 }

          $bytes  = [System.IO.File]::ReadAllBytes((Resolve-Path $json).Path)
          $nBytes = $bytes.Length
          Write-Host "tokenizer.json: $nBytes bytes ($([math]::Round($nBytes/1MB,2)) MB)"

          # tokenizer_data.h — solo declaraciones extern
          # Escribir linea a linea para evitar conflictos YAML/heredoc con comillas
          $hLines = [System.Collections.Generic.List[string]]::new()
          $hLines.Add("// tokenizer_data.h -- generado por el workflow. NO editar.")
          $hLines.Add("#pragma once")
          $hLines.Add("#include <stddef.h>")
          $hLines.Add("extern const unsigned char tokenizer_json_data[];")
          $hLines.Add("extern const unsigned long long tokenizer_json_size;")
          [System.IO.File]::WriteAllLines(
              (Join-Path (Get-Location) "src/tokenizer_data.h"),
              $hLines,
              [System.Text.UTF8Encoding]::new($false))
          Write-Host "OK: src/tokenizer_data.h"

          # tokenizer_data.cpp — definicion del array (unsigned char, pragma warnings)
          $sb = [System.Text.StringBuilder]::new($nBytes * 6)
          $sb.AppendLine("// tokenizer_data.cpp -- generado por el workflow. NO editar.") | Out-Null
          $sb.AppendLine("#ifdef _MSC_VER")                                               | Out-Null
          $sb.AppendLine("#  pragma warning(push)")                                        | Out-Null
          $sb.AppendLine("#  pragma warning(disable: 4838 4309 4365 4267)")                | Out-Null
          $sb.AppendLine("#endif")                                                         | Out-Null
          $sb.AppendLine("#include <stddef.h>")                                            | Out-Null
          $sb.AppendLine("extern const unsigned long long tokenizer_json_size = ${nBytes}ULL;")   | Out-Null
          $sb.AppendLine("extern const unsigned char tokenizer_json_data[] = {")                  | Out-Null

          $COLS = 32
          for ($i = 0; $i -lt $nBytes; $i += $COLS) {
              $end   = [Math]::Min($i + $COLS, $nBytes)
              $chunk = $bytes[$i..($end - 1)]
              $hexes = ($chunk | ForEach-Object { "0x{0:x2}u" -f $_ }) -join ","
              $sb.AppendLine("    $hexes,") | Out-Null
          }

          $sb.AppendLine("    0x00u")   | Out-Null
          $sb.AppendLine("};")          | Out-Null
          $sb.AppendLine("#ifdef _MSC_VER")   | Out-Null
          $sb.AppendLine("#  pragma warning(pop)") | Out-Null
          $sb.AppendLine("#endif")      | Out-Null

          [System.IO.File]::WriteAllText(
              (Join-Path (Get-Location) "src/tokenizer_data.cpp"),
              $sb.ToString(),
              [System.Text.UTF8Encoding]::new($false))
          Write-Host "OK: src/tokenizer_data.cpp ($([math]::Round((Get-Item src/tokenizer_data.cpp).Length/1KB,1)) KB)"

      - name: CMake Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DS2_VULKAN=ON `
            -DGGML_VULKAN=ON `
            -DS2_CUDA=OFF `
            -DS2_METAL=OFF `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_VULKAN_FLASH_ATTENTION=ON `
            -DVulkan_INCLUDE_DIR="$env:Vulkan_INCLUDE_DIR" `
            -DVulkan_LIBRARY="$env:Vulkan_LIBRARY" `
            -DGGML_VULKAN_COOPMAT_GLSLC_SUPPORT=OFF `
            -DGGML_VULKAN_COOPMAT2_GLSLC_SUPPORT=OFF `
            -DGGML_VULKAN_INTEGER_DOT_GLSLC_SUPPORT=OFF

      - name: CMake Build
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Verificar ejecutable
        shell: pwsh
        run: |
          $exe = "build\Release\s2.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "s2.exe no fue generado."
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "OK: s2.exe generado ($sizeMB MB)"
          # Ejecutar --help e ignorar el exit code (s2 retorna 1 sin modelos)
          & $exe --help 2>&1 | Out-Null
          $global:LASTEXITCODE = 0
          Write-Host "OK: s2.exe ejecuta correctamente"

      - name: Empaquetar release
        shell: pwsh
        run: |
          # Con BUILD_SHARED_LIBS=OFF y CROW_ENABLE_SSL=0, el exe no necesita
          # DLLs de ggml ni de OpenSSL. Solo quedan las del runtime de MSVC
          # (vcruntime140.dll, msvcp140.dll) que Windows 10+ ya incluye por defecto,
          # y vulkan-1.dll que viene con los drivers de GPU (NVIDIA/AMD/Intel).
          #
          # Resultado: s2.exe standalone. Sin DLLs adicionales.

          New-Item -ItemType Directory -Force -Path release | Out-Null

          Copy-Item build\Release\s2.exe release\

          # tokenizer.json ya esta embebido en s2.exe — no se distribuye por separado.
          # Solo se incluye si el build fallo en embeber (fallback de seguridad).
          $hasFallback = $false
          if (Test-Path tokenizer.json) {
              # Comprobar si el exe tiene el simbolo embebido
              # (si tokenizer_data.h se genero correctamente, no hace falta el .json)
              Write-Host "INFO: tokenizer.json presente en repo pero NO incluido en release (embebido en exe)"
          }

          $sizeMB = [math]::Round((Get-Item release\s2.exe).Length / 1MB, 1)
          Write-Host "`nContenido del release:"
          Get-ChildItem release\ | Format-Table Name, Length -AutoSize
          Write-Host "Tamanio de s2.exe: $sizeMB MB (incluye tokenizer embebido)"

      - name: Subir artifact
        uses: actions/upload-artifact@v6
        with:
          name: s2-windows-vulkan
          path: release/
          retention-days: 30

      - name: Crear ZIP para GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          Compress-Archive -Path release\* -DestinationPath "s2-$tag-windows-vulkan.zip"
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Publicar GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: s2-*-windows-vulkan.zip
          generate_release_notes: true

  build-cuda:
    name: Windows Server 2025 - MSVC - CUDA 12
    runs-on: windows-2025

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Instalar CUDA Toolkit 12.6
        uses: Jimver/cuda-toolkit@v0.2.23
        with:
          cuda: '12.6.3'
          method: network
          sub-packages: '["nvcc", "cudart", "cublas", "cublas_dev", "thrust", "visual_studio_integration"]'

      - name: Verificar CUDA
        shell: pwsh
        run: |
          nvcc --version
          $cudaPath = $env:CUDA_PATH
          if (-Not $cudaPath) { $cudaPath = $env:CUDA_PATH_V12_6 }
          if (-Not $cudaPath) { Write-Error "CUDA_PATH no encontrado"; exit 1 }
          Write-Host "CUDA_PATH = $cudaPath"
          "CUDA_PATH=$cudaPath" >> $env:GITHUB_ENV

      - name: Parchear CMakeLists.txt para CUDA
        shell: pwsh
        run: pwsh -File patch-cmake-cuda.ps1

      - name: Cache Crow headers
        uses: actions/cache@v5
        with:
          path: build/_deps/crow-include
          key: crow-${{ runner.os }}-v1.3.1

      - name: Generar tokenizer_data embebido en el exe
        shell: pwsh
        run: |
          $json = "tokenizer.json"
          if (-Not (Test-Path $json)) { Write-Error "tokenizer.json no encontrado"; exit 1 }

          $bytes  = [System.IO.File]::ReadAllBytes((Resolve-Path $json).Path)
          $nBytes = $bytes.Length
          Write-Host "tokenizer.json: $nBytes bytes ($([math]::Round($nBytes/1MB,2)) MB)"

          $hLines = [System.Collections.Generic.List[string]]::new()
          $hLines.Add("// tokenizer_data.h -- generado por el workflow. NO editar.")
          $hLines.Add("#pragma once")
          $hLines.Add("#include <stddef.h>")
          $hLines.Add("extern const unsigned char tokenizer_json_data[];")
          $hLines.Add("extern const unsigned long long tokenizer_json_size;")
          [System.IO.File]::WriteAllLines(
              (Join-Path (Get-Location) "src/tokenizer_data.h"),
              $hLines,
              [System.Text.UTF8Encoding]::new($false))
          Write-Host "OK: src/tokenizer_data.h"

          $sb = [System.Text.StringBuilder]::new($nBytes * 6)
          $sb.AppendLine("// tokenizer_data.cpp -- generado por el workflow. NO editar.") | Out-Null
          $sb.AppendLine("#ifdef _MSC_VER")                                               | Out-Null
          $sb.AppendLine("#  pragma warning(push)")                                        | Out-Null
          $sb.AppendLine("#  pragma warning(disable: 4838 4309 4365 4267)")                | Out-Null
          $sb.AppendLine("#endif")                                                         | Out-Null
          $sb.AppendLine("#include <stddef.h>")                                            | Out-Null
          $sb.AppendLine("extern const unsigned long long tokenizer_json_size = ${nBytes}ULL;")   | Out-Null
          $sb.AppendLine("extern const unsigned char tokenizer_json_data[] = {")                  | Out-Null

          $COLS = 32
          for ($i = 0; $i -lt $nBytes; $i += $COLS) {
              $end   = [Math]::Min($i + $COLS, $nBytes)
              $chunk = $bytes[$i..($end - 1)]
              $hexes = ($chunk | ForEach-Object { "0x{0:x2}u" -f $_ }) -join ","
              $sb.AppendLine("    $hexes,") | Out-Null
          }

          $sb.AppendLine("    0x00u")   | Out-Null
          $sb.AppendLine("};")          | Out-Null
          $sb.AppendLine("#ifdef _MSC_VER")   | Out-Null
          $sb.AppendLine("#  pragma warning(pop)") | Out-Null
          $sb.AppendLine("#endif")      | Out-Null

          [System.IO.File]::WriteAllText(
              (Join-Path (Get-Location) "src/tokenizer_data.cpp"),
              $sb.ToString(),
              [System.Text.UTF8Encoding]::new($false))
          Write-Host "OK: src/tokenizer_data.cpp ($([math]::Round((Get-Item src/tokenizer_data.cpp).Length/1KB,1)) KB)"

      - name: CMake Configure (CUDA)
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DS2_CUDA=ON `
            -DGGML_CUDA=ON `
            -DS2_VULKAN=OFF `
            -DS2_METAL=OFF `
            -DBUILD_SHARED_LIBS=OFF `
            -DGGML_CUDA_ARCHITECTURES=86 `
            -DGGML_AVX2=ON `
            -DGGML_STATIC=ON `
            -DCMAKE_CUDA_RUNTIME_LIBRARY=Static `
            -DGGML_AVX512=OFF `
            -DGGML_VULKAN_FLASH_ATTENTION=OFF

      - name: CMake Build (CUDA)
        shell: pwsh
        run: cmake --build build --config Release --parallel

      - name: Verificar ejecutable CUDA
        shell: pwsh
        run: |
          $exe = "build\Release\s2-cuda.exe"
          if (-Not (Test-Path $exe)) {
            Write-Error "s2-cuda.exe no fue generado."
            exit 1
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "OK: s2-cuda.exe generado ($sizeMB MB)"
          & $exe --help 2>&1 | Out-Null
          $global:LASTEXITCODE = 0
          Write-Host "OK: s2-cuda.exe ejecuta correctamente"

      - name: Empaquetar release CUDA
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release-cuda | Out-Null
          Copy-Item build\Release\s2-cuda.exe release-cuda\

          # cudart esta linkeado estaticamente en el exe (GGML_STATIC=ON +
          # CMAKE_CUDA_RUNTIME_LIBRARY=Static). NO se necesita cudart64_12.dll.
          #
          # cublas NO tiene version estatica en Windows (NVIDIA no la provee).
          # cublas64_12.dll y cublasLt64_12.dll son las unicas DLLs obligatorias.
          $cudaPath = $env:CUDA_PATH
          if (-Not $cudaPath) { $cudaPath = $env:CUDA_PATH_V12_6 }

          $cublas = Join-Path $cudaPath "bin\cublas64_12.dll"
          if (Test-Path $cublas) {
              Copy-Item $cublas release-cuda\
              Write-Host "OK: cublas64_12.dll incluida"
          } else {
              Write-Warning "cublas64_12.dll no encontrada en $cudaPath\bin"
          }

          $cublasLt = Join-Path $cudaPath "bin\cublasLt64_12.dll"
          if (Test-Path $cublasLt) {
              Copy-Item $cublasLt release-cuda\
              Write-Host "OK: cublasLt64_12.dll incluida"
          } else {
              Write-Warning "cublasLt64_12.dll no encontrada -- puede faltar en runtime"
          }

          $sizeMB = [math]::Round((Get-Item release-cuda\s2-cuda.exe).Length / 1MB, 1)
          Write-Host "`nContenido del release CUDA:"
          Get-ChildItem release-cuda\ | Format-Table Name, Length -AutoSize
          Write-Host "Tamanio de s2-cuda.exe: $sizeMB MB (cudart embebido, cublas dinamica)"

      - name: Subir artifact CUDA
        uses: actions/upload-artifact@v6
        with:
          name: s2-windows-cuda
          path: release-cuda/
          retention-days: 30

      - name: Crear ZIP para GitHub Release (CUDA)
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        run: |
          $tag = $env:GITHUB_REF -replace 'refs/tags/', ''
          Compress-Archive -Path release-cuda\* -DestinationPath "s2-$tag-windows-cuda.zip"
        env:
          GITHUB_REF: ${{ github.ref }}

      - name: Publicar GitHub Release (CUDA)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v3
        with:
          files: s2-*-windows-cuda.zip
          generate_release_notes: true
