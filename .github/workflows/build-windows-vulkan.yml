name: Build s2.cpp — Windows + Vulkan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:   # permite lanzarlo manualmente desde la pestaña Actions

jobs:
  build:
    name: Windows Server 2025 · MSVC · Vulkan
    runs-on: windows-latest   # Windows Server 2025 con Visual Studio 2022

    steps:
      # ────────────────────────────────────────────────────────────────
      # 1. CHECKOUT
      #    El ZIP que tienes ya incluye el contenido completo de ggml
      #    (no es un submodulo vacío), así que un checkout normal basta.
      #    Si en algún momento mueves el repo a git con submodulos reales,
      #    activa la línea "submodules: recursive".
      # ────────────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        # with:
        #   submodules: recursive   # descomentar si ggml es submodulo real

      # ────────────────────────────────────────────────────────────────
      # 2. VULKAN SDK
      #    Necesitamos los headers de Vulkan y que find_package(Vulkan)
      #    tenga éxito. Los shaders (.spv y .hpp) ya vienen precompilados
      #    en el repo, así que glslc NO recompilará nada.
      # ────────────────────────────────────────────────────────────────
      - name: Instalar Vulkan SDK
        uses: humbletim/install-vulkan-sdk@v1.1.1
        with:
          version: latest
          cache: true

      # ────────────────────────────────────────────────────────────────
      # 3. PRE-POSICIONAR SHADERS PRECOMPILADOS
      #
      #    El CMakeLists de ggml-vulkan genera el header de shaders con:
      #      OUTPUT = ${CMAKE_CURRENT_BINARY_DIR}/ggml-vulkan-shaders.hpp
      #              = build/ggml/src/ggml-vulkan/ggml-vulkan-shaders.hpp
      #
      #    Si ese archivo YA EXISTE antes de que CMake configure el build,
      #    CMake detecta que el OUTPUT del custom_command está satisfecho
      #    y no invoca vulkan-shaders-gen ni glslc.
      #
      #    El ZIP incluye:
      #      - ggml/src/ggml-vulkan/ggml-vulkan-shaders.hpp  (176 KB)
      #      - ggml/src/ggml-vulkan/vulkan-shaders.spv/*.spv (1450 archivos)
      #    Los copiamos al directorio de build antes del configure.
      # ────────────────────────────────────────────────────────────────
      - name: Pre-posicionar shaders precompilados
        shell: pwsh
        run: |
          $buildVkDir = "build\ggml\src\ggml-vulkan"
          New-Item -ItemType Directory -Force -Path $buildVkDir | Out-Null

          # Header precompilado — evita que vulkan-shaders-gen se ejecute
          Copy-Item "ggml\src\ggml-vulkan\ggml-vulkan-shaders.hpp" `
                    "$buildVkDir\ggml-vulkan-shaders.hpp"

          # Directorio de .spv precompilados
          $spvDst = "$buildVkDir\vulkan-shaders.spv"
          New-Item -ItemType Directory -Force -Path $spvDst | Out-Null
          Copy-Item "ggml\src\ggml-vulkan\vulkan-shaders.spv\*" `
                    $spvDst -Recurse

          Write-Host "Shaders pre-posicionados correctamente."
          Write-Host "HPP presente: $(Test-Path $buildVkDir\ggml-vulkan-shaders.hpp)"
          Write-Host "SPV count: $((Get-ChildItem $spvDst -Filter *.spv).Count)"

      # ────────────────────────────────────────────────────────────────
      # 4. CACHÉ DE DEPENDENCIAS FETCHCONTENT
      #    Crow, Asio y cxxopts se descargan solo la primera vez.
      # ────────────────────────────────────────────────────────────────
      - name: Caché de dependencias FetchContent
        uses: actions/cache@v4
        with:
          path: build/_deps
          key: deps-${{ runner.os }}-${{ hashFiles('CMakeLists.txt') }}
          restore-keys: deps-${{ runner.os }}-

      # ────────────────────────────────────────────────────────────────
      # 5. REEMPLAZAR CMakeLists.txt RAÍZ
      #    El original hace find_package(Crow REQUIRED) sin fallback.
      #    Esta versión descarga Crow y Asio automáticamente y agrega
      #    los defines correctos para compilar en Windows con MSVC.
      # ────────────────────────────────────────────────────────────────
      - name: Reemplazar CMakeLists.txt con versión Windows-compatible
        shell: pwsh
        run: |
          $cmake = @'
cmake_minimum_required(VERSION 3.14)
project(s2cpp LANGUAGES C CXX)

set(CMAKE_CXX_STANDARD 17)
set(CMAKE_CXX_STANDARD_REQUIRED ON)
set(CMAKE_POSITION_INDEPENDENT_CODE ON)

option(S2_VULKAN "Build with Vulkan backend" OFF)
option(S2_CUDA   "Build with CUDA backend"   OFF)
option(S2_METAL  "Build with Metal backend"  OFF)

set(GGML_BUILD_TESTS    OFF CACHE BOOL "" FORCE)
set(GGML_BUILD_EXAMPLES OFF CACHE BOOL "" FORCE)

if(S2_VULKAN)
    set(GGML_VULKAN ON CACHE BOOL "" FORCE)
endif()
if(S2_CUDA)
    set(GGML_CUDA ON CACHE BOOL "" FORCE)
endif()
if(S2_METAL)
    set(GGML_METAL ON CACHE BOOL "" FORCE)
endif()

add_subdirectory(ggml)

include(FetchContent)

find_package(Crow QUIET)
if(NOT Crow_FOUND)
    FetchContent_Declare(crow
        GIT_REPOSITORY https://github.com/CrowCpp/Crow.git
        GIT_TAG        v1.2.0
        GIT_SHALLOW    TRUE)
    FetchContent_MakeAvailable(crow)
    set(CROW_INCLUDE_DIRS "${crow_SOURCE_DIR}/include")
    set(CROW_LIBRARIES "")
endif()

find_package(asio QUIET)
if(NOT asio_FOUND)
    FetchContent_Declare(asio
        GIT_REPOSITORY https://github.com/chriskohlhoff/asio.git
        GIT_TAG        asio-1-30-2
        GIT_SHALLOW    TRUE)
    FetchContent_MakeAvailable(asio)
    add_library(asio_iface INTERFACE)
    target_include_directories(asio_iface INTERFACE
        "${asio_SOURCE_DIR}/asio/include")
    target_compile_definitions(asio_iface INTERFACE ASIO_STANDALONE)
endif()

find_package(cxxopts QUIET)
if(NOT cxxopts_FOUND)
    FetchContent_Declare(cxxopts
        GIT_REPOSITORY https://github.com/jarro2783/cxxopts.git
        GIT_TAG        v3.2.1
        GIT_SHALLOW    TRUE)
    FetchContent_MakeAvailable(cxxopts)
endif()

set(S2_SOURCES
    src/s2_audio.cpp
    src/s2_tokenizer.cpp
    src/s2_sampler.cpp
    src/s2_model.cpp
    src/s2_codec.cpp
    src/s2_prompt.cpp
    src/s2_generate.cpp
    src/s2_pipeline.cpp
    src/main.cpp
)

add_executable(s2 ${S2_SOURCES})

target_include_directories(s2 PRIVATE
    ${CMAKE_CURRENT_SOURCE_DIR}/include
    ${CMAKE_CURRENT_SOURCE_DIR}/third_party
    ${CMAKE_CURRENT_SOURCE_DIR}/ggml/include
    ${CMAKE_CURRENT_SOURCE_DIR}/ggml/src
    ${CROW_INCLUDE_DIRS}
)

if(TARGET asio_iface)
    target_link_libraries(s2 PRIVATE asio_iface)
    target_compile_definitions(s2 PRIVATE
        ASIO_STANDALONE
        CROW_ENABLE_SSL=0)
endif()

target_link_libraries(s2 PRIVATE ggml cxxopts::cxxopts)

if(NOT "${CROW_LIBRARIES}" STREQUAL "")
    target_link_libraries(s2 PRIVATE ${CROW_LIBRARIES})
endif()

if(S2_VULKAN)
    target_compile_definitions(s2 PRIVATE GGML_USE_VULKAN)
endif()

if(WIN32)
    target_link_libraries(s2 PRIVATE ws2_32 mswsock)
    target_compile_definitions(s2 PRIVATE
        WIN32_LEAN_AND_MEAN
        NOMINMAX
        _WIN32_WINNT=0x0A00)
    if(MSVC)
        target_compile_options(s2 PRIVATE /W3 /wd4996 /MP
            $<$<CONFIG:Release>:/O2 /GL>)
        target_link_options(s2 PRIVATE
            $<$<CONFIG:Release>:/LTCG>)
    endif()
elseif(UNIX AND NOT APPLE)
    target_link_libraries(s2 PRIVATE pthread m)
endif()

install(TARGETS s2 RUNTIME DESTINATION bin)
'@
          Set-Content -Path CMakeLists.txt -Value $cmake -Encoding UTF8
          Write-Host "CMakeLists.txt reemplazado correctamente."

      # ────────────────────────────────────────────────────────────────
      # 6. CMAKE CONFIGURE
      # ────────────────────────────────────────────────────────────────
      - name: CMake Configure
        shell: pwsh
        run: |
          cmake -B build -S . `
            -DCMAKE_BUILD_TYPE=Release `
            -DS2_VULKAN=ON `
            -DGGML_VULKAN=ON `
            -DS2_CUDA=OFF `
            -DS2_METAL=OFF

      # ────────────────────────────────────────────────────────────────
      # 7. BUILD
      # ────────────────────────────────────────────────────────────────
      - name: CMake Build
        shell: pwsh
        run: |
          cmake --build build --config Release --parallel

      # ────────────────────────────────────────────────────────────────
      # 8. VERIFICAR EL EJECUTABLE
      #    Corre s2 --help para confirmar que arranca correctamente.
      # ────────────────────────────────────────────────────────────────
      - name: Verificar ejecutable
        shell: pwsh
        run: |
          $exe = "build\Release\s2.exe"
          if (-Not (Test-Path $exe)) {
              Write-Error "ERROR: $exe no fue generado."
              exit 1
          }
          $sizeMB = [math]::Round((Get-Item $exe).Length / 1MB, 1)
          Write-Host "OK: $exe generado ($sizeMB MB)"
          & $exe --help

      # ────────────────────────────────────────────────────────────────
      # 9. EMPAQUETAR
      # ────────────────────────────────────────────────────────────────
      - name: Empaquetar release
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path release | Out-Null

          Copy-Item build\Release\s2.exe release\

          # DLLs del runtime MSVC redistribuible (si existen junto al .exe)
          Get-ChildItem build\Release\*.dll -ErrorAction SilentlyContinue |
              Copy-Item -Destination release\

          # tokenizer.json si está en la raíz
          if (Test-Path tokenizer.json) {
              Copy-Item tokenizer.json release\
              Write-Host "tokenizer.json incluido."
          }

          Write-Host "`nContenido del paquete:"
          Get-ChildItem release\ | Format-Table Name, Length -AutoSize

      # ────────────────────────────────────────────────────────────────
      # 10. ARTIFACT — disponible 30 días en la pestaña Actions
      # ────────────────────────────────────────────────────────────────
      - name: Subir artifact
        uses: actions/upload-artifact@v4
        with:
          name: s2-windows-vulkan
          path: release\
          retention-days: 30

      # ────────────────────────────────────────────────────────────────
      # 11. GITHUB RELEASE AUTOMÁTICO
      #     Solo se activa cuando haces push de un tag:
      #       git tag v1.0.0
      #       git push origin v1.0.0
      # ────────────────────────────────────────────────────────────────
      - name: Crear GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: release\s2.exe
          generate_release_notes: true
